name: Release APK

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Set version from tag
        run: |
          TAG=${GITHUB_REF#refs/tags/v}
          echo "VERSION_NAME=$TAG" >> $GITHUB_ENV
          IFS='.' read -r major minor patch <<< "$TAG"
          CODE=$(( (${major:-0} * 10000) + (${minor:-0} * 100) + (${patch:-0}) ))
          echo "VERSION_CODE=$CODE" >> $GITHUB_ENV

      - name: Build Release APK
        run: ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        uses: r0adkll/sign-android-release@v1
        id: sign_app
        with:
          releaseDirectory: app/build/outputs/apk/release
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEY_ALIAS }}
          keyStorePassword: ${{ secrets.KEY_STORE_PASSWORD }}
          keyPassword: ${{ secrets.KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "34.0.0"

      - name: Rename APK
        run: |
          TAG=${GITHUB_REF#refs/tags/}
          mv ${{ steps.sign_app.outputs.signedReleaseFile }} app/build/outputs/apk/release/drupal-tracker-${TAG}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "DrupalTracker ${{ github.ref_name }}"
          body: |
            ## DrupalTracker ${{ github.ref_name }}

            ### Installation
            Download the APK below and install it on your Android device (Android 8.0+).
            You may need to enable "Install from unknown sources" in your device settings.
          files: app/build/outputs/apk/release/drupal-tracker-${{ github.ref_name }}.apk
          draft: false
          prerelease: false
